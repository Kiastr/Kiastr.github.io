name: build Gmeek
on:
  workflow_dispatch:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  push:
    branches:
      - main
    paths:
      - 'config.json'
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests PyGithub
      - name: Build Gmeek
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python Gmeek.py
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
